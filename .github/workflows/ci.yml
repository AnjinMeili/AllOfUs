name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  typecheck-test:
    name: Type Check + Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install dev-keys dependencies
        run: npm ci
        working-directory: dev-keys

      - name: Type-check agent
        run: npm run check

      - name: Type-check dev-keys
        run: npx tsc --noEmit
        working-directory: dev-keys

      - name: Run tests
        run: npm test

  build:
    name: Build VSIX
    runs-on: macos-latest
    needs: typecheck-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci && cd dev-keys && npm ci

      - name: Build agent
        run: npm run build

      - name: Build dev-keys + VSIX
        run: npm run build:all
        working-directory: dev-keys

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-keys-vsix
          path: dev-keys/dev-keys-*.vsix
