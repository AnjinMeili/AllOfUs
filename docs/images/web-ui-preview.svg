  <!-- Card 2: OpenAI (stored) -->
  <rect x="30" y="276" width="560" height="56" rx="6" fill="#16213e" stroke="#333"/>
  <rect x="30" y="276" width="3" height="56" rx="1" fill="#30d158"/>
