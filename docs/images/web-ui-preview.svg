  <text x="30" y="532" fill="#666" font-size="10" class="mono">Terminal: dev-keys set &lt;name&gt;  ·  Shell: eval "$(dev-keys init)"</text>
  <text x="558" y="532" fill="#888" font-size="10" text-anchor="end">&#x21BB; Refresh</text>
