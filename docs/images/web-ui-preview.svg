  <rect x="76" y="448" width="380" height="0" rx="4" fill="#0f3460" stroke="#444"/>

  <!-- Card 5: GitHub (not set) -->
  <rect x="30" y="468" width="560" height="44" rx="6" fill="#16213e" stroke="#333"/>
  <text x="52" y="495" font-size="16">&#x1F419;</text>
