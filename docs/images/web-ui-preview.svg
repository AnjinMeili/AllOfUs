  <rect x="30" y="340" width="560" height="56" rx="6" fill="#16213e" stroke="#333"/>
  <rect x="30" y="340" width="3" height="56" rx="1" fill="#30d158"/>
  <text x="52" y="365" font-size="16">&#x1F9E0;</text>
