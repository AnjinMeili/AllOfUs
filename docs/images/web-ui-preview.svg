<svg xmlns="http://www.w3.org/2000/svg" width="620" height="540" viewBox="0 0 620 540">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
      .mono { font-family: "SF Mono", Menlo, Consolas, monospace; }
    </style>
  </defs>
  <!-- Window chrome -->
  <rect width="620" height="540" rx="10" fill="#1a1a2e"/>
  <rect width="620" height="36" rx="10" fill="#16213e"/>
