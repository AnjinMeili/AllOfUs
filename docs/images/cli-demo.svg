<svg xmlns="http://www.w3.org/2000/svg" width="620" height="420" viewBox="0 0 620 420">
  <defs>
    <style>
      text { font-family: "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; font-size: 12px; }
      .prompt { fill: #30d158; }
      .cmd { fill: #e0e0e0; }
      .dim { fill: #666; }
      .cyan { fill: #5ac8fa; }
      .green { fill: #30d158; }
      .yellow { fill: #ffd60a; }
      .comment { fill: #555; }
    </style>
  </defs>
  <!-- Window chrome -->
  <rect width="620" height="420" rx="10" fill="#1c1c1e"/>
  <rect width="620" height="36" rx="10" fill="#2c2c2e"/>
  <rect y="26" width="620" height="10" fill="#2c2c2e"/>
  <circle cx="20" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="18" r="6" fill="#28c840"/>
  <text x="310" y="22" fill="#888" font-size="12" text-anchor="middle">Terminal — zsh</text>

  <!-- Line 1: store key -->
  <text x="16" y="58" class="prompt">$</text>
  <text x="28" y="58" class="cmd"> dev-keys set openrouter sk-or-v1-abc123</text>
  <text x="16" y="76" class="green">&#x2713; Stored <tspan font-weight="700">openrouter</tspan></text>

  <!-- Line 2: store another -->
  <text x="16" y="100" class="prompt">$</text>
  <text x="28" y="100" class="cmd"> dev-keys set anthropic</text>
  <text x="16" y="118" class="cmd">Enter value for <tspan class="cyan">anthropic</tspan>: ********</text>
  <text x="16" y="136" class="green">&#x2713; Stored <tspan font-weight="700">anthropic</tspan></text>

  <!-- Line 3: list -->
  <text x="16" y="160" class="prompt">$</text>
  <text x="28" y="160" class="cmd"> dev-keys list</text>
  <text x="16" y="178" class="dim">2 key(s) in Keychain:</text>
  <text x="16" y="196" class="cyan">  anthropic</text>
  <text x="16" y="214" class="cyan">  openrouter</text>

  <!-- Line 4: show -->
  <text x="16" y="238" class="prompt">$</text>
  <text x="28" y="238" class="cmd"> dev-keys show openrouter</text>
  <text x="16" y="256" class="cyan">openrouter          </text>
  <text x="160" y="256" class="cmd">sk-o****************************</text>

  <!-- Line 5: env -->
  <text x="16" y="280" class="prompt">$</text>
  <text x="28" y="280" class="cmd"> dev-keys env openrouter</text>
  <text x="16" y="298" class="cmd">export OPENROUTER_API_KEY='sk-or-v1-abc123'</text>

  <!-- Line 6: with-key -->
  <text x="16" y="322" class="prompt">$</text>
  <text x="28" y="322" class="cmd"> eval "$(dev-keys init)"</text>
  <text x="16" y="346" class="prompt">$</text>
  <text x="28" y="346" class="cmd"> with-key openrouter npm start</text>

  <!-- Line 7: ui -->
  <text x="16" y="370" class="prompt">$</text>
  <text x="28" y="370" class="cmd"> dev-keys ui</text>
  <text x="16" y="388" class="dim">  &#x1F510; dev-keys UI running at http://localhost:9876</text>
  <text x="16" y="406" class="comment">  # Opens in default browser</text>
</svg>
